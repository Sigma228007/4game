<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07070E"/>
      <stop offset="1" stop-color="#14142E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.4">
      <stop offset="0" stop-color="#E8102E" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E8102E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.75" r="0.35">
      <stop offset="0" stop-color="#9333EA" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#9333EA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8102E"/>
      <stop offset="0.5" stop-color="#FF5C73"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- grid lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.03">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- logo -->
  <g transform="translate(80, 90)">
    <rect width="80" height="80" rx="18" fill="url(#accent)"/>
    <path d="M22 36c-3 0-6 2-6 6v6c0 3 2 6 5 6 2 0 3-1 4-2l2-3h26l2 3c1 1 2 2 4 2 3 0 5-3 5-6v-6c0-4-3-6-6-6H22z M28 46v4 M26 48h4 M52 46a2 2 0 1 1 0-4 2 2 0 0 1 0 4z M56 50a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="68" cy="14" r="5" fill="#10B981"/>
  </g>

  <!-- "4GAME" wordmark -->
  <text x="80" y="320" font-family="Orbitron, Arial Black, sans-serif" font-weight="900" font-size="140" letter-spacing="-4">
    <tspan fill="#E8102E">4</tspan><tspan fill="#ffffff">GAME</tspan>
  </text>

  <!-- tagline -->
  <text x="80" y="395" font-family="Exo 2, Arial, sans-serif" font-weight="400" font-size="34" fill="#ffffff" opacity="0.6">
    Магазин лицензионных игр для ПК
  </text>

  <!-- feature chips -->
  <g font-family="Orbitron, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="2" fill="#ffffff">
    <g transform="translate(80, 460)">
      <rect width="260" height="50" rx="25" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="28" cy="25" r="4" fill="#10B981"/>
      <text x="52" y="31">ЛИЦЕНЗИОННЫЕ КЛЮЧИ</text>
    </g>
    <g transform="translate(360, 460)">
      <rect width="220" height="50" rx="25" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="28" cy="25" r="4" fill="#F59E0B"/>
      <text x="52" y="31">ВЫДАЧА ЗА 30 СЕК</text>
    </g>
    <g transform="translate(600, 460)">
      <rect width="200" height="50" rx="25" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="28" cy="25" r="4" fill="#9333EA"/>
      <text x="52" y="31">ПОДДЕРЖКА 24/7</text>
    </g>
  </g>

  <!-- right side decoration - big "4" -->
  <text x="1130" y="500" text-anchor="end" font-family="Orbitron, Arial Black, sans-serif" font-weight="900" font-size="380" fill="#ffffff" opacity="0.025">4</text>
</svg>
